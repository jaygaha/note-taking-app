<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} - NoteTakingApp</title>
    <script>
        // Set the theme before first paint so there's no flash of the wrong palette.
        (function () {
            try {
                var stored = localStorage.getItem('theme');
                var theme = stored === 'light' || stored === 'dark'
                    ? stored
                    : (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
                document.documentElement.setAttribute('data-theme', theme);
            } catch (e) {}
        })();
    </script>
    <link rel="stylesheet" href="{{ url_for('static', filename='dist/output.css') }}">
    <link rel="shortcut icon" href="{{ url_for('static', filename='favicon.ico') }}">
</head>

<body
    class="{% if app_shell %}h-dvh overflow-hidden{% else %}min-h-screen{% endif %} font-sans bg-bg-page text-text-body antialiased flex flex-col selection:bg-accent-subtle selection:text-text-heading">

    {% if not app_shell %}
    {% include 'components/_header.html' %}
    {% endif %}

    <main class="flex-1 flex flex-col w-full min-h-0 relative">
        <!-- Flash Messages -->
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        <div class="fixed bottom-6 right-4 sm:right-6 z-[100] flex flex-col-reverse gap-2.5 w-[calc(100%-2rem)] max-w-sm pointer-events-none">
            {% for category, message in messages %}
            <div role="status" class="flash-message pointer-events-auto p-3.5 rounded-lg shadow-md border text-sm font-medium transition-all duration-500
                        {% if category in ['danger', 'error'] %}
                            bg-error-light border-error/20 text-error
                        {% elif category == 'success' %}
                            bg-success-light border-success/20 text-success
                        {% else %}
                            bg-bg-surface border-border-subtle text-text-heading
                        {% endif %}">
                {{ message }}
            </div>
            {% endfor %}
        </div>
        {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </main>

    <script>
        // Auto-hide flash messages after 5 seconds
        document.addEventListener('DOMContentLoaded', function() {
            const flashMessages = document.querySelectorAll('.flash-message');
            flashMessages.forEach(function(message) {
                setTimeout(function() {
                    message.style.opacity = '0';
                    message.style.transform = 'translateX(20px)';
                    setTimeout(function() {
                        message.remove();
                    }, 500); // Wait for fade out animation to finish
                }, 5000); // 5 seconds
            });
        });

        // Use Cmd+K or Ctrl+K to focus search input
        document.addEventListener('keydown', function(e) {
            if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
                e.preventDefault();
                const searchInput = document.getElementById('search-input');
                if (searchInput) {
                    searchInput.focus();
                }
            }
        });

        // Close any open <details class="dropdown"> (e.g. account menu) on outside click.
        // Scoped to .dropdown only — the notes-list category toggles are plain <details>
        // and must stay independent of each other and of this listener.
        document.addEventListener('click', function(e) {
            document.querySelectorAll('details.dropdown[open]').forEach(function(details) {
                if (!details.contains(e.target)) {
                    details.removeAttribute('open');
                }
            });
        });

        // Light/dark theme toggle — persists the visitor's explicit choice,
        // overriding the system preference in either direction (see input.css).
        function syncThemeToggleLabels(theme) {
            var label = theme === 'dark' ? 'Switch to light mode' : 'Switch to dark mode';
            document.querySelectorAll('.theme-toggle').forEach(function(btn) {
                btn.setAttribute('aria-label', label);
                btn.setAttribute('title', label);
            });
        }

        document.addEventListener('DOMContentLoaded', function() {
            var current = document.documentElement.getAttribute('data-theme') === 'dark' ? 'dark' : 'light';
            syncThemeToggleLabels(current);
        });

        document.addEventListener('click', function(e) {
            var toggle = e.target.closest('.theme-toggle');
            if (!toggle) return;
            var current = document.documentElement.getAttribute('data-theme') === 'dark' ? 'dark' : 'light';
            var next = current === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', next);
            try { localStorage.setItem('theme', next); } catch (e) {}
            syncThemeToggleLabels(next);
        });
    </script>
</body>

</html>
